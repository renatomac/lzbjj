<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LZBJJ Fight Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:     #e8001c;
            --red-dim: #7a000e;
            --gold:    #c8960c;
            --white:   #f0ece4;
            --dark:    #080608;
            --mid:     #110d10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* ── BODY / ARENA BACKGROUND ─────────────────────────────── */
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            position: relative;
        }

        /* ── LOGO WATERMARK ─────────────────────────────────────── */
        .bg-logo {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }
        .bg-logo img {
            width: min(72vw, 72vh);
            height: auto;
            opacity: 0.07;
            filter: grayscale(1) brightness(2);
            /* subtle slow pulse so the logo feels alive */
            animation: logoPulse 8s ease-in-out infinite alternate;
        }
        @keyframes logoPulse {
            0%   { opacity: 0.05; transform: scale(1); }
            100% { opacity: 0.11; transform: scale(1.03); }
        }

        /* ── VIGNETTE ───────────────────────────────────────────── */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center,
                transparent 30%,
                rgba(8,6,8,0.55) 65%,
                rgba(8,6,8,0.92) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* ── SCAN-LINE TEXTURE ──────────────────────────────────── */
        .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.18) 3px,
                rgba(0,0,0,0.18) 4px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanMove 12s linear infinite;
        }
        @keyframes scanMove {
            from { background-position: 0 0; }
            to   { background-position: 0 200px; }
        }

        /* ── CORNER BRACKETS ────────────────────────────────────── */
        .bracket {
            position: absolute;
            width: 60px;
            height: 60px;
            border-color: var(--red);
            border-style: solid;
            opacity: 0.5;
            z-index: 5;
        }
        .bracket.tl { top: 24px; left: 24px;  border-width: 3px 0 0 3px; }
        .bracket.tr { top: 24px; right: 24px;  border-width: 3px 3px 0 0; }
        .bracket.bl { bottom: 24px; left: 24px;  border-width: 0 0 3px 3px; }
        .bracket.br { bottom: 24px; right: 24px;  border-width: 0 3px 3px 0; }

        /* ── HORIZONTAL RULE LINES ──────────────────────────────── */
        .h-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--red-dim) 20%, var(--red) 50%, var(--red-dim) 80%, transparent);
            opacity: 0.35;
            z-index: 5;
        }
        .h-line.top    { top: 80px; }
        .h-line.bottom { bottom: 80px; }

        /* ── MAIN CONTENT ───────────────────────────────────────── */
        .stage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            width: 100%;
            padding: 0 4vw;
        }

        /* ── PHASE LABEL (WORK / REST / READY) ──────────────────── */
        .phase-label {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.8rem, 5vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--white);
            padding: 0.15em 1.4em;
            border-top: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            margin-bottom: 0.3em;
            transition: color 0.25s, border-color 0.25s, text-shadow 0.25s;
            text-shadow: 0 0 18px currentColor;
            position: relative;
        }
        /* small tick marks on the borders */
        .phase-label::before,
        .phase-label::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 2px solid currentColor;
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }
        .phase-label::before { left: -4px; }
        .phase-label::after  { right: -4px; }

        .phase-work  { color: #00e676; }
        .phase-rest  { color: var(--red); }
        .phase-ready { color: #888; }
        .phase-done  { color: var(--gold); }

        /* ── TIMER DIGITS ───────────────────────────────────────── */
        .timer-digits {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(14rem, 26vw, 28rem);
            line-height: 0.88;
            letter-spacing: 0.04em;
            color: var(--white);
            text-shadow:
                0 0 40px rgba(232,0,28,0.25),
                0 0 80px rgba(232,0,28,0.1),
                4px 4px 0px rgba(0,0,0,0.6);
            transition: color 0.2s, text-shadow 0.2s;
            position: relative;
        }

        /* Work state: green tint */
        .digits-work {
            color: #e8ffe8;
            text-shadow:
                0 0 40px rgba(0,230,118,0.3),
                0 0 80px rgba(0,230,118,0.15),
                4px 4px 0px rgba(0,0,0,0.6);
        }

        /* Rest state: red tint */
        .digits-rest {
            color: #ffe8e8;
            text-shadow:
                0 0 40px rgba(232,0,28,0.5),
                0 0 100px rgba(232,0,28,0.2),
                4px 4px 0px rgba(0,0,0,0.6);
        }

        /* Warning: full red flash */
        .digits-warning {
            color: var(--red) !important;
            text-shadow:
                0 0 20px #ff0020,
                0 0 60px #ff0020,
                0 0 120px rgba(255,0,32,0.4) !important;
            animation: warningFlash 0.6s ease-in-out infinite alternate;
        }
        @keyframes warningFlash {
            0%   { opacity: 0.8;  letter-spacing: 0.04em; }
            100% { opacity: 1;    letter-spacing: 0.06em; }
        }

        /* ── ROUND INFO ─────────────────────────────────────────── */
        .round-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(1rem, 2.8vw, 2.2rem);
            letter-spacing: 0.2em;
            color: #666;
            margin-top: 0.6em;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .round-info span {
            color: var(--gold);
        }

        /* ── STATUS BAR (bottom) ────────────────────────────────── */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 36px;
            background: rgba(8,6,8,0.85);
            border-top: 1px solid rgba(232,0,28,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 20;
        }
        .status-bar .dot {
            width: 7px; height: 7px;
            background: #444;
            border-radius: 50%;
            margin-right: 8px;
            transition: background 0.3s, box-shadow 0.3s;
            display: inline-block;
        }
        .status-bar .dot.live {
            background: #00e676;
            box-shadow: 0 0 6px #00e676;
            animation: dotBlink 2s ease-in-out infinite;
        }
        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }
        .status-bar .label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: #555;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .status-bar .label.live { color: #00e676; }
        .status-bar .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 0.2em;
            color: var(--red-dim);
        }

        /* ── STATE: DONE GOLD SHIMMER ───────────────────────────── */
        .digits-done {
            background: linear-gradient(90deg, #c8960c, #ffe066, #c8960c);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            animation: goldShimmer 2s linear infinite;
        }
        @keyframes goldShimmer {
            from { background-position: 200% center; }
            to   { background-position: -200% center; }
        }
    </style>
</head>
<body>

    <!-- Logo watermark -->
    <div class="bg-logo">
        <img src={% static 'crm/img/LZBJJ_White.png' %}
             alt=""
             onerror="this.style.display='none'">
    </div>

    <!-- Atmosphere layers -->
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <!-- Corner brackets -->
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <!-- Horizontal lines -->
    <div class="h-line top"></div>
    <div class="h-line bottom"></div>

    <!-- Main display -->
    <div class="stage">
        <div class="phase-label phase-ready" id="timerLabel">READY</div>
        <div class="timer-digits" id="timerDisplay">00:00</div>
        <div class="round-info" id="roundInfo">ROUND &nbsp;<span>—</span>&nbsp;/&nbsp;<span>—</span></div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
        <div style="display:flex;align-items:center;">
            <span class="dot" id="statusDot"></span>
            <span class="label" id="statusLabel">CONNECTING...</span>
        </div>
        <div class="brand">LZBJJ · FIGHT TIMER</div>
    </div>

    <!-- Cast Receiver SDK -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

    <script>
    (function () {
        const CUSTOM_NAMESPACE = 'urn:x-cast:com.yourdomain.timer';

        const timerEl  = document.getElementById('timerDisplay');
        const labelEl  = document.getElementById('timerLabel');
        const roundEl  = document.getElementById('roundInfo');
        const dotEl    = document.getElementById('statusDot');
        const statEl   = document.getElementById('statusLabel');

        // ── UI UPDATER ────────────────────────────────────────────
        function applyState(data) {
            // Time
            if (data.time) timerEl.textContent = data.time;

            // Determine phase
            const raw   = (data.label || '').toLowerCase();
            let phase   = 'ready';
            if (raw.includes('work'))  phase = 'work';
            if (raw.includes('rest'))  phase = 'rest';
            if (raw.includes('done'))  phase = 'done';
            if (raw.includes('ready')) phase = 'ready';

            // Phase label text — strip round info from it if present
            const labelText = raw.includes('round') ? phaseFromLabel(raw) : (data.label || 'READY').toUpperCase();

            // Apply label styles
            labelEl.className = 'phase-label phase-' + phase;
            labelEl.textContent = labelText;

            // Timer digit styles
            timerEl.className = 'timer-digits';
            if (data.warning) {
                timerEl.classList.add('digits-warning');
            } else {
                if (phase !== 'ready') timerEl.classList.add('digits-' + phase);
            }

            // Round info
            const roundMatch = (data.label || '').match(/round\s+(\d+)\s*[\/\-]\s*(\d+)/i);
            const simpleMatch = (data.label || '').match(/round\s+(\d+)/i);
            if (roundMatch) {
                roundEl.innerHTML = `ROUND &nbsp;<span>${roundMatch[1]}</span>&nbsp;/&nbsp;<span>${roundMatch[2]}</span>`;
            } else if (simpleMatch) {
                roundEl.innerHTML = `ROUND &nbsp;<span>${simpleMatch[1]}</span>`;
            } else if (data.roundText) {
                roundEl.textContent = data.roundText;
            }
        }

        function phaseFromLabel(raw) {
            if (raw.includes('work')) return 'WORK';
            if (raw.includes('rest')) return 'REST';
            if (raw.includes('done')) return 'DONE';
            return 'READY';
        }

        function setStatus(text, live) {
            statEl.textContent = text;
            statEl.className   = 'label' + (live ? ' live' : '');
            dotEl.className    = 'dot'   + (live ? ' live' : '');
        }

        function setReadyUI() {
            timerEl.textContent = '00:00';
            timerEl.className   = 'timer-digits';
            labelEl.textContent = 'READY';
            labelEl.className   = 'phase-label phase-ready';
            roundEl.innerHTML   = 'ROUND &nbsp;<span>—</span>&nbsp;/&nbsp;<span>—</span>';
        }

        // ── CAST RECEIVER SETUP ───────────────────────────────────
        const context = cast.framework.CastReceiverContext.getInstance();
        const options = new cast.framework.CastReceiverOptions();
        options.disableIdleTimeout = true;
        options.maxInactivity = 3600;

        context.addCustomMessageListener(CUSTOM_NAMESPACE, function (event) {
            const d = event.data;
            if (!d) return;
            applyState(d);
            setStatus('LIVE · RECEIVING', true);
        });

        context.addEventListener(cast.framework.system.EventType.READY, () => {
            setReadyUI();
            setStatus('RECEIVER READY', false);
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
            setStatus('SENDER CONNECTED', true);
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
            setStatus('SENDER DISCONNECTED', false);
        });

        context.start(options);

        // Debug hook
        window.debugCastUpdate = (time, label, warning) => applyState({ time, label, warning });
    })();
    </script>
</body>
</html>
