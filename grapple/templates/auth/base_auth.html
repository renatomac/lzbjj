<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LZBJJ CRM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; /* bg-gray-100 equivalent */
        }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 3rem; /* py-12 equivalent */
            padding-bottom: 3rem;
        }
        .auth-card {
            background-color: white;
            padding: 2rem; /* p-8 equivalent */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); /* shadow-lg equivalent */
            border-radius: 0.5rem; /* rounded-lg equivalent */
        }
    </style>
</head>
<body class="h-100">
    <div class="auth-container">
        <div class="container-sm" style="max-width: 28rem;"> 
            <div class="text-center">
                <h2 class="mt-4 mb-4 fs-2 fw-bold text-dark">
                    LZBJJ CRM
                </h2>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alert alert-dismissible fade show rounded-3 p-3 
                        {% if 'danger' in messages[0][0] %}alert-danger
                        {% elif 'success' in messages[0][0] %}alert-success
                        {% else %}alert-info
                        {% endif %}" role="alert">
                        <ul class="list-unstyled mb-0">
                        {% for category, message in messages %}
                            <li class="small fw-semibold mb-0">{{ message }}</li>
                        {% endfor %}
                        </ul>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}
            {% endwith %}

            <div class="auth-card">
                {% block auth_content %}{% endblock %}
            </div>

            <p class="mt-4 text-center text-muted small">
                &copy; {{ now().year }} Lake Zurich Brazilian Jiu-Jitsu
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
