<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <!-- Use Tailwind CSS for a modern, responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="text-center space-y-6">
        <!-- Main heading for the error -->
        <h1 class="text-9xl font-extrabold text-blue-500 tracking-widest animate-pulse">404</h1>
        
        <!-- Subheading and main message -->
        <div class="bg-gray-800 px-4 py-3 rounded-md shadow-lg">
            <h2 class="text-4xl font-bold text-white mb-2">Page Not Found</h2>
            <p class="text-lg text-gray-400">
                Oops! It looks like the page you are looking for has moved or does not exist.
                <br class="hidden sm:block"> No worries, we'll get you back on track!
            </p>
        </div>
        
        <!-- A friendly, themed icon -->
        <div class="flex justify-center items-center gap-4 text-blue-400">
            <!-- A simple SVG icon for a grappling hook or gi -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zM5.52 11.23a.75.75 0 011.06-.05L10 14.28l3.42-3.09a.75.75 0 011.06.05l1.98 1.76a.75.75 0 01-1.06 1.06L10 12.72l-5.48 4.97a.75.75 0 01-1.06-1.06l1.98-1.76z" clip-rule="evenodd" />
            </svg>
        </div>

        <!-- Button to go back to the homepage -->
        <a href="/" class="inline-block px-8 py-3 text-lg font-semibold text-white bg-blue-600 rounded-full shadow-lg transition-transform transform hover:scale-105 hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50">
            Go to Homepage
        </a>
    </div>
</body>
</html>
