<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error</title>
    <!-- Use Tailwind CSS for a modern, responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="text-center space-y-6">
        <!-- Main heading for the error -->
        <h1 class="text-9xl font-extrabold text-red-500 tracking-widest animate-pulse">500</h1>
        
        <!-- Subheading and main message -->
        <div class="bg-gray-800 px-4 py-3 rounded-md shadow-lg">
            <h2 class="text-4xl font-bold text-white mb-2">Server Error</h2>
            <p class="text-lg text-gray-400">
                Oops! It looks like our server ran into an issue.
                <br class="hidden sm:block"> Our team has been notified and is working on a fix. Please try again later.
            </p>
        </div>
        
        <!-- A friendly, themed icon -->
        <div class="flex justify-center items-center gap-4 text-red-400">
            <!-- A simple SVG icon for a gear/cog representing a server issue -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 animate-spin" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-1-8a1 1 0 11-2 0 1 1 0 012 0zm3 0a1 1 0 11-2 0 1 1 0 012 0zm-3 4a1 1 0 11-2 0 1 1 0 012 0zm3 0a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd" />
            </svg>
        </div>

        <!-- Button to go back to the homepage -->
        <a href="/" class="inline-block px-8 py-3 text-lg font-semibold text-white bg-red-600 rounded-full shadow-lg transition-transform transform hover:scale-105 hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-500 focus:ring-opacity-50">
            Go to Homepage
        </a>
    </div>
</body>
</html>
