{% extends "layout.html" %}

{% block title %}Settings{% endblock %}
{% block header_title %}Settings{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="card main-card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold mb-0">Membership Plan</h3>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for plan in plans %}
                            <tr>
                                <td>{{ plan.name }}</td>
                                <td>{{ plan.description }}</td>
                                <td>{{ plan.price }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
            </div>
        </div>          
        <div class="text-end">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-custom-ghost me-2">Cancel</a>
        </div>
    </div>
    <div class="col-lg-4">
        </div>
</div>
{% endblock %}
