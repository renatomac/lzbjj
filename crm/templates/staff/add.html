{% extends "layout.html" %}

{% block title %}Add Staff{% endblock %}
{% block header_title %}Staff Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card main-card mb-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold mb-0">{{title}}</h3>
                    <a href="{% url 'staff'%}" class="btn btn-custom-ghost"><i class="fa-solid fa-arrow-left"></i> Back to Staff</a>
                </div>
                {% load crispy_forms_tags %}
                <form action="{% if action_url == 'addStaff' %}
                                {% url 'addStaff' %}
                            {% else %}
                                {% url 'editStaff' staff_id=staff_id %}
                            {% endif %}"  
                        method="post">
                    {% csrf_token %}
                    {{ form |crispy}}
                    <input type="submit" value="Submit">
                </form>    
            </div>
        </div>
    </div>

</div>
{% endblock %}
